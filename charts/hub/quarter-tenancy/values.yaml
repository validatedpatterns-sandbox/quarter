# Defaults are sourced from values-global.yaml and values-hub.yaml at repository root.
global:
  pattern: quarter
  gitops:
    namespace: openshift-gitops
    project: hub
  repositories:
    tenancyPolicy:
      repoURL: https://github.com/ngner/tenancy-by-acm-policy.git
      targetRevision: main
    tenantGui:
      repoURL: https://github.com/ngner/tenant-form-acm-gui.git
      targetRevision: main
  policyGenerator:
    acmSubscriptionImage: registry.redhat.io/rhacm2/multicluster-operators-subscription-rhel9:v2.16
    binarySourcePath: /policy-generator/PolicyGenerator-not-fips-compliant
    binaryTargetPath: /.config/kustomize/plugin/policy.open-cluster-management.io/v1/policygenerator/PolicyGenerator
  secrets:
    backend: abstract
    keycloak:
      targetSecretName: keycloak-tenant-realm
      namespace: tenancies
      clientSecretKey: client-secret
    vault:
      enabled: false
      path: secret/data/quarter/keycloak
      field: client-secret
    externalSecrets:
      enabled: false
      secretStoreRef:
        name: default
        kind: ClusterSecretStore
      remoteRef:
        key: quarter/keycloak
        property: client-secret

clusterGroup:
  name: hub
  isHubCluster: true

hub:
  applications:
    tenancyBase:
      enabled: true
      namespace: tenancies
      project: tenancy-policy
      path: tenancies
      syncWave: "10"
      prune: true
      selfHeal: true
    tenancyPlacements:
      enabled: true
      namespace: tenancies
      project: tenancy-policy
      path: placements
      syncWave: "20"
      prune: true
      selfHeal: true
    tenancyAccessControl:
      enabled: true
      namespace: policies
      project: tenancy-policy
      path: policygen/AC-Access-Control
      syncWave: "30"
      prune: false
      selfHeal: false
    tenancyConfigurationManagement:
      enabled: true
      namespace: policies
      project: tenancy-policy
      path: policygen/CM-Configuration-Management
      syncWave: "40"
      prune: true
      selfHeal: true
    tenancySystemAndCommsProtection:
      enabled: true
      namespace: policies
      project: tenancy-policy
      path: policygen/SC-System-and-Communications-Protection
      syncWave: "50"
      prune: true
      selfHeal: true
    tenantGui:
      enabled: true
      namespace: tenant-form-acm-gui
      project: tenancy-policy
      path: deployment
      syncWave: "60"
      prune: true
      selfHeal: true
      image: quay.io/validatedpatterns/tenant-form-acm-gui:latest
  consolePluginPatch:
    enabled: true
    pluginName: tenant-form-acm-gui
    syncWave: "70"
