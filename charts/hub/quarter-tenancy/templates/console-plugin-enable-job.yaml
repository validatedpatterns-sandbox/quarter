{{- if .Values.hub.consolePluginPatch.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: console-plugin-enabler
  namespace: {{ include "quarter.namespaceGitops" . }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.hub.consolePluginPatch.syncWave | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: console-plugin-enabler
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.hub.consolePluginPatch.syncWave | quote }}
rules:
  - apiGroups:
      - operator.openshift.io
    resources:
      - consoles
    resourceNames:
      - cluster
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: console-plugin-enabler
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.hub.consolePluginPatch.syncWave | quote }}
subjects:
  - kind: ServiceAccount
    name: console-plugin-enabler
    namespace: {{ include "quarter.namespaceGitops" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: console-plugin-enabler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-gui-image-patcher
  namespace: tenant-form-acm-gui
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.hub.consolePluginPatch.syncWave | quote }}
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
    resourceNames:
      - tenant-form-acm-gui
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-gui-image-patcher
  namespace: tenant-form-acm-gui
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.hub.consolePluginPatch.syncWave | quote }}
subjects:
  - kind: ServiceAccount
    name: console-plugin-enabler
    namespace: {{ include "quarter.namespaceGitops" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant-gui-image-patcher
---
apiVersion: batch/v1
kind: Job
metadata:
  name: console-plugin-enable
  namespace: {{ include "quarter.namespaceGitops" . }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.hub.consolePluginPatch.syncWave | quote }}
spec:
  template:
    spec:
      serviceAccountName: console-plugin-enabler
      restartPolicy: OnFailure
      containers:
        - name: patch-console-plugins
          image: quay.io/openshift/origin-cli:4.16
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              plugin="{{ .Values.hub.consolePluginPatch.pluginName }}"
              existing_lines="$(oc get console.operator cluster -o jsonpath='{range .spec.plugins[*]}{.}{"\n"}{end}' || true)"
              if [[ -z "${existing_lines}" ]]; then
                oc patch console.operator cluster --type merge --patch "{\"spec\":{\"plugins\":[\"${plugin}\"]}}"
                exit 0
              fi

              while IFS= read -r current; do
                [[ -z "${current}" ]] && continue
                if [[ "${current}" == "${plugin}" ]]; then
                  echo "Plugin already enabled"
                  exit 0
                fi
              done <<< "${existing_lines}"

              merged="["
              while IFS= read -r current; do
                [[ -z "${current}" ]] && continue
                merged="${merged}\"${current}\","
              done <<< "${existing_lines}"
              merged="${merged}\"${plugin}\"]"
              oc patch console.operator cluster --type merge --patch "{\"spec\":{\"plugins\":${merged}}}"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: tenant-gui-image-set
  namespace: {{ include "quarter.namespaceGitops" . }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.hub.consolePluginPatch.syncWave | quote }}
spec:
  template:
    spec:
      serviceAccountName: console-plugin-enabler
      restartPolicy: OnFailure
      containers:
        - name: set-tenant-gui-image
          image: quay.io/openshift/origin-cli:4.16
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              oc -n tenant-form-acm-gui set image deployment/tenant-form-acm-gui \
                tenant-form-acm-gui={{ .Values.hub.applications.tenantGui.image }}
{{- end }}
