apiVersion: v1
kind: ConfigMap
metadata:
  name: quarter-secret-abstraction
  namespace: {{ .Values.global.secrets.keycloak.namespace }}
data:
  backend: {{ .Values.global.secrets.backend | quote }}
  targetSecretName: {{ .Values.global.secrets.keycloak.targetSecretName | quote }}
  targetSecretKey: {{ .Values.global.secrets.keycloak.clientSecretKey | quote }}
---
{{- if and (eq .Values.global.secrets.backend "vault") .Values.global.secrets.vault.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.secrets.keycloak.targetSecretName }}
  namespace: {{ .Values.global.secrets.keycloak.namespace }}
  annotations:
    quarter.validatedpatterns.io/adapter: vault
    quarter.validatedpatterns.io/vault-path: {{ .Values.global.secrets.vault.path | quote }}
    quarter.validatedpatterns.io/vault-field: {{ .Values.global.secrets.vault.field | quote }}
type: Opaque
stringData:
  {{ .Values.global.secrets.keycloak.clientSecretKey }}: "<managed-by-vault>"
---
{{- end }}
{{- if and (eq .Values.global.secrets.backend "external-secrets") .Values.global.secrets.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.global.secrets.keycloak.targetSecretName }}
  namespace: {{ .Values.global.secrets.keycloak.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.global.secrets.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.global.secrets.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.global.secrets.keycloak.targetSecretName }}
  data:
    - secretKey: {{ .Values.global.secrets.keycloak.clientSecretKey }}
      remoteRef:
        key: {{ .Values.global.secrets.externalSecrets.remoteRef.key }}
        property: {{ .Values.global.secrets.externalSecrets.remoteRef.property }}
{{- end }}
