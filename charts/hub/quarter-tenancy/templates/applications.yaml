{{- $gitopsNs := include "quarter.namespaceGitops" . -}}
{{- $policyRepo := .Values.global.repositories.tenancyPolicy -}}
{{- $guiRepo := .Values.global.repositories.tenantGui -}}
{{- $apps := .Values.hub.applications -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenancy-base
  namespace: {{ $gitopsNs }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $apps.tenancyBase.syncWave | quote }}
spec:
  project: {{ $apps.tenancyBase.project }}
  destination:
    namespace: {{ $apps.tenancyBase.namespace }}
    server: https://kubernetes.default.svc
  source:
    repoURL: {{ $policyRepo.repoURL | quote }}
    targetRevision: {{ $policyRepo.targetRevision | quote }}
    path: {{ $apps.tenancyBase.path | quote }}
  syncPolicy:
    automated:
      prune: {{ $apps.tenancyBase.prune }}
      selfHeal: {{ $apps.tenancyBase.selfHeal }}
    syncOptions:
      - CreateNamespace=true
---
